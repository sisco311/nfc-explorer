name: Build Android APK

on:
  workflow_dispatch: # This allows you to trigger the build manually

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the dec branch
      uses: actions/checkout@v4
      with:
        ref: dec

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17' # Note: updated to 17, as newer Android builds often require it. If it fails, we can downgrade to 11.
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: nfc-explorer-dec-apk
        path: app/build/outputs/apk/debug/app-debug.apk
